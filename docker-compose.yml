x-app-build: &app-build
  restart: unless-stopped
  networks: [mol]

x-airflow-common: &airflow-common
  image: ${AIRFLOW_IMAGE:-apache/airflow:3.0.6}
  profiles: ["airflow"]
  environment: &airflow-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__AUTH_MANAGER: airflow.api_fastapi.auth.managers.simple.simple_auth_manager.SimpleAuthManager
    AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_ALL_ADMINS: "true"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__FERNET_KEY: ""
    AIRFLOW__CORE__EXECUTION_API_SERVER_URL: http://airflow-apiserver:8080/execution/
    AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW_JWT_SECRET:-mol-dev-secret}
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_DB_USER:-airflow}:${AIRFLOW_DB_PASSWORD:-airflow}@airflow-db/${AIRFLOW_DB_NAME:-airflow}
  volumes:
    - ${AIRFLOW_PROJ_DIR:-./services/ingestor/airflow}/dags:/opt/airflow/dags
    - airflow-logs:/opt/airflow/logs
  user: "${AIRFLOW_UID:-50000}:0"
  networks: [mol]
  depends_on:
    airflow-db:
      condition: service_healthy

services:
  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    networks: [mol]
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage

  auth-db:
    image: postgres:16-alpine
    restart: unless-stopped
    networks: [mol]
    environment:
      POSTGRES_USER: ${AUTH_DB_USER:-auth}
      POSTGRES_PASSWORD: ${AUTH_DB_PASSWORD:-auth}
      POSTGRES_DB: ${AUTH_DB_NAME:-auth}
    volumes:
      - auth-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${AUTH_DB_USER:-auth}"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth:
    <<: *app-build
    build: ./services/auth
    environment:
      DATABASE_URL: ${AUTH_DATABASE_URL:-postgresql+asyncpg://auth:auth@auth-db:5432/auth}
      JWT_SECRET: ${JWT_SECRET:-mol-dev-secret-change-me}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      COOKIE_SAMESITE: ${COOKIE_SAMESITE:-lax}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:8081}
      YANDEX_CLIENT_ID: ${YANDEX_CLIENT_ID:-}
      YANDEX_SECRET_ID: ${YANDEX_SECRET_ID:-}
      YANDEX_REDIRECT_DOMAIN: ${YANDEX_REDIRECT_DOMAIN:-http://localhost:8081/api/auth}
    depends_on:
      auth-db:
        condition: service_healthy

  ai-agent:
    <<: *app-build
    build: ./services/ai-agent
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      AI_AGENT_MODEL: ${AI_AGENT_MODEL:-claude-sonnet-4-6}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-mol_documents}
    depends_on:
      - qdrant

  ingestor:
    <<: *app-build
    build: ./services/ingestor
    environment:
      AIRFLOW_API_URL: http://airflow-apiserver:8080/api/v2
      AIRFLOW_USERNAME: ${_AIRFLOW_WWW_USER_USERNAME:-airflow}
      AIRFLOW_PASSWORD: ${_AIRFLOW_WWW_USER_PASSWORD:-airflow}

  gateway:
    <<: *app-build
    build: ./services/gateway
    environment:
      AUTH_URL: http://auth:8000
      AI_AGENT_URL: http://ai-agent:8000
      INGESTOR_URL: http://ingestor:8000
    ports:
      - "${GATEWAY_PORT:-8080}:8000"
    depends_on:
      auth:
        condition: service_healthy
      ai-agent:
        condition: service_healthy
      ingestor:
        condition: service_healthy

  frontend:
    <<: *app-build
    build: ./frontend
    ports:
      - "${FRONTEND_PORT:-8081}:80"
    depends_on:
      - gateway

  airflow-db:
    image: postgres:16-alpine
    profiles: ["airflow"]
    restart: unless-stopped
    networks: [mol]
    environment:
      POSTGRES_USER: ${AIRFLOW_DB_USER:-airflow}
      POSTGRES_PASSWORD: ${AIRFLOW_DB_PASSWORD:-airflow}
      POSTGRES_DB: ${AIRFLOW_DB_NAME:-airflow}
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${AIRFLOW_DB_USER:-airflow}"]
      interval: 10s
      timeout: 5s
      retries: 5

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command: -c "airflow db migrate"
    restart: "no"

  airflow-apiserver:
    <<: *airflow-common
    command: api-server
    restart: unless-stopped
    ports:
      - "${AIRFLOW_API_PORT:-8082}:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/api/v2/monitor/health"]
      interval: 15s
      timeout: 5s
      retries: 5
    depends_on:
      airflow-db:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    restart: unless-stopped
    depends_on:
      airflow-db:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

  airflow-dag-processor:
    <<: *airflow-common
    command: dag-processor
    restart: unless-stopped
    depends_on:
      airflow-db:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

volumes:
  qdrant-data:
  pg-data:
  auth-db-data:
  airflow-logs:

networks:
  mol:
    driver: bridge
